name = "xiuxian-bestip-collector"
main = "workers.js"
compatibility_date = "2024-12-01"

# KV 绑定说明：
# 部署后需在 CF Dashboard 创建 KV 命名空间 "IP_STORAGE"
# 然后绑定到此 Worker: npx wrangler kv:namespace create IP_STORAGE
# 部署: npx wrangler deploy -c scripts/cf-bestip-collector/wrangler.toml

[[kv_namespaces]]
binding = "IP_STORAGE"
id = "b83030cd6e76432ab6f65bf3974a0abd"

[triggers]
crons = ["0 */4 * * *"]  # 每4小时自动更新
