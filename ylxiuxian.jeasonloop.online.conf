# ylxiuxian.jeasonloop.online Nginx 反向代理配置
# 请将此文件保存到 /etc/nginx/conf.d/ylxiuxian.jeasonloop.online.conf

server {
    listen 80;
    server_name ylxiuxian.jeasonloop.online;
    # HTTP 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ylxiuxian.jeasonloop.online;

    # 你的SSL证书路径（请确认证书路径正确）
    ssl_certificate     /root/react-xiuxian-game/ssl/fullchain.crt;
    ssl_certificate_key /root/react-xiuxian-game/ssl/privkey.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # 添加安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 反向代理到 Docker 容器
    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 增大超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 代理特殊处理（会被上面的 location / 匹配，不需要额外配置）
    # Nginx 会自动把 /api 传递给 docker 容器内的 nginx，再转发到后端
}
